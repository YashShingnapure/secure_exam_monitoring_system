<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Access</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #f5f7fb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            width: 420px;
            background: white;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        }

        h2 {
            margin: 0;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            background: #f3f3f3;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: transparent;
        }

        .tab.active {
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            font-size: 13px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #eef4ff;
            outline: none;
            font-family: Arial, Helvetica, sans-serif;
        }

        .btn {
            width: 100%;
            padding: 13px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #000, #333);
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .terms {
            margin-top: 16px;
            font-size: 12px;
            text-align: center;
            color: #666;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Welcome to SecureExam</h2>
    <div class="subtitle">Login to access your dashboard</div>

    <div class="tabs">
        <button class="tab active" onclick="showLogin()">Login</button>
        <button class="tab" onclick="showRegister()">Register</button>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <!-- LOGIN FORM -->
    <form id="loginForm" method="POST" action="/college-auth">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">Login</button>

        <div style="margin-top: 15px; text-align:center;">
            <a href="{{ url_for('college_forgot_password') }}" style="text-decoration:none; font-size:13px;">
                Forgot Password?
            </a>
        </div>

    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="hidden" method="POST" action="/college-register">
        <div class="form-group">
            <label>College Name</label>
            <input type="text" name="college_name" required>
        </div>

        <div class="form-group">
            <label>Stream</label>
            <select name="stream" required>
                <option value="">Select Stream</option>
                <option value="Engineering">Engineering</option>
                <option value="Arts">Arts</option>
                <option value="Commerce">Commerce</option>
                <option value="Science">Science</option>
                <option value="Medical">Medical</option>
                <option value="Law">Law</option>
                <option value="Management">Management</option>
            </select>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Centre Code</label>
            <input type="text" name="centre_code" placeholder="Enter Centre Code" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">Register</button>
    </form>

    <div class="terms">
        By continuing, you agree to our Terms of Service and Privacy Policy
    </div>
</div>

<script>
    const tabs = document.querySelectorAll(".tab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    function showLogin() {
        tabs[0].classList.add("active");
        tabs[1].classList.remove("active");
        loginForm.classList.remove("hidden");
        registerForm.classList.add("hidden");
    }

    function showRegister() {
        tabs[1].classList.add("active");
        tabs[0].classList.remove("active");
        registerForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
    }
</script>

</body>
</html>
