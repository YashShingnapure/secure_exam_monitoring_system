<!DOCTYPE html>
<html>
<head>
    <title>College Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        function showTab(tab) {
            document.getElementById("login").classList.add("hidden");
            document.getElementById("register").classList.add("hidden");
            document.getElementById(tab).classList.remove("hidden");

            document.getElementById("loginBtn").classList.remove("active");
            document.getElementById("registerBtn").classList.remove("active");
            document.getElementById(tab + "Btn").classList.add("active");
        }
    </script>
</head>
<body>

<div class="auth-card">
    <h2>College Access</h2>
    <p class="subtitle">Login or register your college</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    <div class="tabs">
        <button id="loginBtn" class="active" onclick="showTab('login')">Login</button>
        <button id="registerBtn" onclick="showTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <form id="login" method="POST">
        <input type="hidden" name="action" value="login">

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn-primary">Login</button>
    </form>

    <!-- REGISTER -->
    <form id="register" method="POST" class="hidden">
        <input type="hidden" name="action" value="register">

        <div class="form-group">
            <label>College Name</label>
            <input type="text" name="college_name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn-primary">Register</button>
    </form>
</div>

</body>
</html>
